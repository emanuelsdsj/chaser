name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "CHANGELOG.md"

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install docs dependencies
        run: pip install "mkdocs>=1.6" "mkdocs-material>=9.5" "mkdocs-material-extensions>=1.3"

      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force
